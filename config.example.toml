# Пример конфигурации файлового наблюдателя
# Задержка перед выполнением команды (дебаунсинг)
delay = "500ms"

# Максимальное количество параллельных команд (0 = неограниченно)
max_parallel = 0

# Конфигурация наблюдения 1: сжатие логов
[[watch]]
path = "/var/log"
recursive = true
command = "gzip"
args = ["-f", "{file}"]
timeout = "30s"

# Конфигурация наблюдения 2: уведомление об изменениях
[[watch]]
path = "C:\\Users\\AppData"
command = "notify-send"
args = ["Файл изменен: {file}"]
timeout = "10s"

# Конфигурация наблюдения 3: сборка проекта
[[watch]]
path = "./watch_folder"
recursive = true
command = "cmd"
args = ["/C", "echo Обработано файлов: {WATCH_FILE_COUNT}"]
timeout = "60s"
